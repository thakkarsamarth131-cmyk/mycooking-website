<!DOCTYPE html>
<html>
<head>
    <title>Cooking Recipe Finder</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        input {
            padding: 10px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        img {
            width: 300px;
            margin-top: 20px;
        }
        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🍳 Recipe Finder</h1>

    <input type="text" id="mealInput" placeholder="Enter dish name">
    <button onclick="searchMeal()">Search</button>

    <div id="result"></div>

<script>
async function searchMeal() {
    const mealName = document.getElementById("mealInput").value;
    const response = await fetch("https://www.themealdb.com/api/json/v1/1/search.php?s=" + mealName);
    const data = await response.json();

    if (!data.meals) {
        document.getElementById("result").innerHTML = "❌ No recipe found!";
        return;
    }

    const meal = data.meals[0];

    let ingredients = "";
    for (let i = 1; i <= 20; i++) {
        if (meal["strIngredient" + i]) {
            ingredients += meal["strIngredient" + i] + " - " + meal["strMeasure" + i] + "<br>";
        }
    }

    document.getElementById("result").innerHTML = `
        <h2>${meal.strMeal}</h2>
        <img src="${meal.strMealThumb}">
        <h3>Ingredients:</h3>
        ${ingredients}
        <h3>Instructions:</h3>
        <p>${meal.strInstructions}</p>
        <h3>🎥 YouTube Videos:</h3>
        <a href="https://www.youtube.com/results?search_query=${mealName}+recipe" target="_blank">
        Watch Recipe Videos Here
        </a>
    `;
}
</script>

</body>
</html>
